<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stoc - Salon Elena</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Management Stoc - Salon Elena</h1>
        <nav>
            <ul>
                <li><a href="index.html">Acasă</a></li>
                <li><a href="stock.html">Stoc</a></li>
                <li><a href="clients.html">Clienți</a></li>
                <li><a href="men.html">Tuns Bărbați</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h2>Adaugă Produs în Stoc</h2>
        <form id="stockForm">
            <label for="productName">Nume Produs:</label>
            <input type="text" id="productName" required>
            <label for="quantity">Cantitate:</label>
            <input type="number" id="quantity" required>
            <button type="submit">Adaugă</button>
        </form>
        <h2>Lista Stoc</h2>
        <table id="stockTable">
            <thead>
                <tr>
                    <th>Nume Produs</th>
                    <th>Cantitate</th>
                    <th>Acțiuni</th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>
    </main>
    <footer>
        <p>&copy; 2025 Salon Elena. Toate drepturile rezervate.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
