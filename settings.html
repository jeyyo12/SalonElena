<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setări - Salon Elena</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <h1><i class="fas fa-spa"></i> Salon Elena <i class="fas fa-spa"></i></h1>
        <nav>
            <ul>
                <li><a href="index.html">Dashboard</a></li>
                <li><a href="clients.html">Clienți</a></li>
                <li><a href="earnings.html">Încasări Zilnice</a></li>
                <li><a href="settings.html" class="active">Setări</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h2>Setări</h2>
        <div class="settings-section">
            <h3>Servicii și Prețuri</h3>
            <form id="servicesForm">
                <label for="serviceName">Nume Serviciu:</label>
                <input type="text" id="serviceName" required>
                <label for="servicePrice">Preț (RON):</label>
                <input type="number" id="servicePrice" step="0.01" required>
                <button type="submit">Adaugă Serviciu</button>
            </form>
            <ul id="servicesList">
            </ul>
        </div>
        <div class="settings-section">
            <h3>Metode de Plată</h3>
            <p>Disponibile: Cash, Card, Transfer</p>
        </div>
    </main>
    <footer>
        <p>&copy; 2025 Salon Elena. Toate drepturile rezervate.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
