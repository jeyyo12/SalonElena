<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Salon Elena</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <h1><i class="fas fa-spa"></i> Salon Elena <i class="fas fa-spa"></i></h1>
        <nav>
            <ul>
                <li><a href="index.html" class="active">Dashboard</a></li>
                <li><a href="clients.html">Clienți</a></li>
                <li><a href="earnings.html">Încasări Zilnice</a></li>
                <li><a href="settings.html">Setări</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h2>Dashboard</h2>
        <div class="dashboard-cards">
            <div class="card">
                <h3>Total Clienți</h3>
                <p id="totalClients">0</p>
            </div>
            <div class="card">
                <h3>Încasări Astăzi</h3>
                <p id="todayEarnings">0 RON</p>
            </div>
            <div class="card">
                <h3>Profit Astăzi</h3>
                <p id="todayProfit">0 RON</p>
            </div>
            <div class="card">
                <h3>Clienți Serviți Astăzi</h3>
                <p id="todayClients">0</p>
            </div>
        </div>
        <div class="recent-activity">
            <h3>Activitate Recentă</h3>
            <ul id="recentList">
            </ul>
        </div>
    </main>
    <footer>
        <p>&copy; 2025 Salon Elena. Toate drepturile rezervate.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
