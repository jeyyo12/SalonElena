<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuns Bărbați - Salon Elena</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Clienți Bărbați - Salon Elena</h1>
        <nav>
            <ul>
                <li><a href="index.html">Management</a></li>
                <li><a href="clients.html">Clienți Femei</a></li>
                <li><a href="men.html">Clienți Bărbați</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h2>Adaugă Client Bărbat</h2>
        <form id="menClientForm">
            <label for="menClientName">Nume Client:</label>
            <input type="text" id="menClientName" required>
            <label for="charge">Sumă Încasată (RON):</label>
            <input type="number" id="charge" step="0.01" required>
            <button type="submit">Adaugă</button>
        </form>
        <h2>Lista Clienți Bărbați</h2>
        <table id="menTable">
            <thead>
                <tr>
                    <th>Nume Client</th>
                    <th>Sumă Încasată</th>
                    <th>Data</th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>
    </main>
    <footer>
        <p>&copy; 2025 Salon Elena. Toate drepturile rezervate.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
